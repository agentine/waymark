name: Publish

on:
  release:
    types: [published]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23', '1.24']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test ./... -race -count=1
      - name: Vet
        run: go vet ./...

  index:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Request pkg.go.dev indexing
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          curl -s "https://proxy.golang.org/github.com/agentine/waymark/@v/${VERSION}.info" || true
          curl -s "https://sum.golang.org/lookup/github.com/agentine/waymark@${VERSION}" || true
          echo "Requested indexing for github.com/agentine/waymark@${VERSION}"
